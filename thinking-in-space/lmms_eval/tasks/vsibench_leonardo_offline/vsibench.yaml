dataset_path: parquet
dataset_kwargs:
  cache_dir: vsibench
  data_files:
    test:
      - /leonardo_scratch/fast/EUHPC_D32_006/vsibench/test_pruned.parquet
      - /leonardo_scratch/fast/EUHPC_D32_006/vsibench/test_debiased.parquet

task: vsibench
test_split: test
output_type: generate_until
process_docs: !function utils.process_docs
doc_to_visual: !function utils.vsibench_doc_to_visual
doc_to_text: !function utils.vsibench_doc_to_text
doc_to_target: "ground_truth"
generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.vsibench_process_results
metric_list:
  - metric: vsibench_score
    aggregation: !function utils.vsibench_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    mca_post_prompt: "Answer with the option's letter from the given choices directly."
    na_post_prompt: "Please answer the question using a single word or phrase."
metadata:
  - version: 0.0
